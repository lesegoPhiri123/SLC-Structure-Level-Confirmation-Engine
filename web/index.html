<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLC Engine</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<header>
  <h1>SLC <span class="subtle">Structure · Level · Confirmation</span></h1>
  <div class="header-meta">
    <span id="regimeBadge" class="badge badge-flat">—</span>
    <span id="symbolLabel" class="subtle"></span>
    <span id="updatedLabel" class="subtle"></span>
  </div>
</header>

<main>
  <section class="chart-pane">
    <div id="chart"></div>
  </section>

  <aside class="side-pane">
    <div class="panel">
      <h2>Active Zones</h2>
      <ul id="zoneList" class="list"></ul>
    </div>
    <div class="panel">
      <h2>Recent Signals</h2>
      <ul id="signalList" class="list"></ul>
    </div>
    <div class="panel">
      <h2>Recent Trades</h2>
      <ul id="tradeList" class="list"></ul>
    </div>
  </aside>
</main>

<script src="app.js"></script>
</body>
</html>
